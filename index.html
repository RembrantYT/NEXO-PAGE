<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO | Tu espacio de calma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; }
        .bg-nexo-gradient { background: linear-gradient(108deg, #eef2ff 0%, #f0fdf4 100%); }
        .dark .bg-nexo-gradient { background: linear-gradient(108deg, #1a202c 0%, #121f1a 100%); }
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-nexo-gradient text-gray-900 dark:text-gray-100 antialiased relative overflow-x-hidden">

    <button onclick="document.documentElement.classList.toggle('dark')" class="fixed top-24 right-6 z-40 p-3 bg-white/20 dark:bg-black/20 backdrop-blur-md rounded-full border border-white/30 shadow-lg hover:scale-110 transition-all">
        <span class="dark:hidden text-2xl">🌙</span>
        <span class="hidden dark:inline text-2xl">☀️</span>
    </button>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-80 bg-white dark:bg-gray-900 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 border-l border-gray-200 dark:border-gray-800">
        <div class="p-6 h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold">Tu Carrito 🛒</h2>
                <button onclick="toggleCart()" class="text-2xl hover:rotate-90 transition-transform">✕</button>
            </div>
            
            <div id="cart-items" class="flex-1 overflow-y-auto">
                <p id="empty-msg" class="text-gray-500 italic text-center mt-10">Tu carrito está vacío...</p>
            </div>

            <div class="border-t border-gray-200 dark:border-gray-700 pt-6 space-y-4">
                <div class="flex justify-between text-xl font-bold">
                    <span>Total:</span>
                    <span id="cart-total-price">$0.00 MXN</span>
                </div>
                <button onclick="handleBuyNow()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold hover:bg-green-700 transition active:scale-95 shadow-lg">
                    Finalizar Compra 🚀
                </button>
                <p class="text-center text-xs text-gray-400">✨ Estás a un paso de la calma total.</p>
            </div>
        </div>
    </div>

    <nav class="flex justify-between items-center px-6 md:px-12 py-6 relative z-10">
        <div class="text-3xl font-extrabold tracking-tighter text-gray-950 dark:text-white">NEXO<span class="text-blue-600">.</span></div>
        <div class="flex items-center gap-6">
            <a href="#beneficios" class="hidden md:block hover:text-blue-600 transition font-medium">Beneficios</a>
            <button onclick="toggleCart()" class="relative p-3 bg-blue-100 dark:bg-blue-900/30 rounded-2xl hover:scale-105 transition active:scale-90">
                <span class="text-xl">🛒</span>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>

    <header class="py-12 md:py-24 px-6 md:px-12 max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
        <div class="space-y-8">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-tight">Siente los pulsos de NEXO y <span class="text-blue-600 italic">deja ir</span> la tensión.</h1>
            <div class="bg-white/40 dark:bg-white/5 backdrop-blur-xl p-8 rounded-[40px] border border-white/40 shadow-2xl space-y-6">
                <div class="flex justify-between items-center">
                    <span id="product-price" class="text-4xl font-black text-blue-600 dark:text-blue-400">$250.00 MXN</span>
                    <div class="flex items-center bg-white dark:bg-gray-800 rounded-2xl p-2 border border-gray-200 dark:border-gray-700 shadow-sm">
                        <button onclick="updateQty(-1)" class="w-10 h-10 font-bold text-xl hover:text-blue-600">-</button>
                        <input type="number" id="qty" value="1" class="w-10 text-center font-bold bg-transparent outline-none" readonly>
                        <button onclick="updateQty(1)" class="w-10 h-10 font-bold text-xl hover:text-blue-600">+</button>
                    </div>
                </div>
                <button onclick="addToCart()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-blue-700 hover:scale-[1.02] transition active:scale-95">
                    🛒 Agregar al carrito
                </button>
            </div>
        </div>
        <div class="flex justify-center items-center">
            <div class="bg-white/40 dark:bg-black/20 p-6 rounded-[50px] shadow-2xl floating border border-white/20">
                <img src="NEXO PHOTO.jpeg" alt="NEXO" class="max-w-xs rounded-[35px] shadow-lg">
            </div>
        </div>
    </header>

    <script>
        const PRICE = 250;
        let cart = { qty: 0, total: 0 };

        function updateQty(val) {
            const input = document.getElementById('qty');
            const priceTag = document.getElementById('product-price');
            let newQty = parseInt(input.value) + val;
            if (newQty >= 1) {
                input.value = newQty;
                priceTag.innerText = `$${(newQty * PRICE).toFixed(2)} MXN`;
            }
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function addToCart() {
            const qtyToAdd = parseInt(document.getElementById('qty').value);
            cart.qty += qtyToAdd;
            cart.total = cart.qty * PRICE;

            // Actualizar interfaz
            document.getElementById('cart-count').innerText = cart.qty;
            document.getElementById('cart-total-price').innerText = `$${cart.total.toFixed(2)} MXN`;
            document.getElementById('empty-msg').style.display = 'none';
            
            // Crear el item en el carrito visual
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = `
                <div class="flex items-center gap-4 bg-gray-50 dark:bg-gray-800 p-4 rounded-2xl border border-gray-100 dark:border-gray-700">
                    <img src="NEXO PHOTO.jpeg" class="w-16 h-16 rounded-lg object-cover">
                    <div>
                        <h4 class="font-bold">NEXO Device</h4>
                        <p class="text-sm text-gray-500">${cart.qty} unidades</p>
                        <p class="font-bold text-blue-600">$${cart.total.toFixed(2)}</p>
                    </div>
                </div>
            `;
            
            // Abrir el carrito automáticamente para que vea que funcionó
            toggleCart();
        }

        function handleBuyNow() {
            if(cart.qty === 0) return alert("¡Tu carrito está vacío!");
            alert(`🚀 Redirigiendo a pago seguro...\nTotal a pagar: $${cart.total.toFixed(2)} MXN\n¡Gracias por confiar en NEXO!`);
        }
    </script>
</body>
</html>
