<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO | Plataforma Oficial</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0b3c5d, #7ed957);
  color: white;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.4);
}

nav ul {
  display: flex;
  gap: 20px;
  list-style: none;
}

nav a {
  color: white;
  text-decoration: none;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

.btn {
  background: #7ed957;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.product-img {
  width: 220px;
  border-radius: 15px;
}

.cart {
  background: rgba(0,0,0,0.3);
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<nav>
  <h2>NEXO</h2>
  <ul>
    <li><a href="#producto">Producto</a></li>
    <li><a href="#contacto">Contacto</a></li>
    <li><button class="btn" onclick="login()">Login Google</button></li>
  </ul>
</nav>

<section id="producto" class="section">
  <h2>NEXO</h2>

  <img src="https://i.postimg.cc/0Q0zZxYw/nexo.jpg" class="product-img">

  <p>Dispositivo portátil de relajación mediante pulsos.</p>

  <h3>Compra</h3>

  <select id="cantidad">
    <option value="1">1</option>
    <option value="2">2</option>
  </select>

  <button class="btn" onclick="comprar()">Comprar</button>

  <div class="cart">
    <p>Usuario: <span id="user"></span></p>
    <p>Stock disponible: <span id="stock"></span></p>
  </div>

</section>

<section id="contacto" class="section">
  <p>📞 231-151-48135</p>
</section>

<!-- FIREBASE -->
<script type="module">

// 🔥 CONFIGURACIÓN
const firebaseConfig = {
    apiKey: "AIzaSyBcZD6ayN9cdYOgc6bpTLpj_dhN0oc5OjI",
    authDomain: "nexo-1d9c2.firebaseapp.com",
    projectId: "nexo-1d9c2",
    storageBucket: "nexo-1d9c2.firebasestorage.app",
    messagingSenderId: "524854384171",
    appId: "1:524854384171:web:7581111dc7c080ad4c7c6e",
    measurementId: "G-5W1FT1QWEL"
  };

// IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// LOGIN
window.login = async function() {
  const result = await signInWithPopup(auth, provider);
  document.getElementById("user").innerText = result.user.email;
}

// STOCK
async function cargarStock() {
  const ref = doc(db, "data", "stock");
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, { cantidad: 4 });
    document.getElementById("stock").innerText = 4;
  } else {
    document.getElementById("stock").innerText = snap.data().cantidad;
  }
}

cargarStock();

// COMPRA
window.comprar = async function() {
  const user = auth.currentUser;
  if (!user) {
    alert("Inicia sesión primero");
    return;
  }

  const cant = parseInt(document.getElementById("cantidad").value);

  const ref = doc(db, "data", "stock");
  const snap = await getDoc(ref);
  let stock = snap.data().cantidad;

  if (cant > stock) {
    alert("Sin stock suficiente");
    return;
  }

  // RESTAR STOCK
  await updateDoc(ref, { cantidad: stock - cant });

  // GUARDAR PEDIDO
  await setDoc(doc(db, "pedidos", user.uid + Date.now()), {
    user: user.email,
    cantidad: cant,
    total: cant * 250
  });

  alert("Compra registrada");

  window.open(https://wa.me/5223115148135?text=Quiero ${cant} NEXO);
}

</script>

</body>
</html>
