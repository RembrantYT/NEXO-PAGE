<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO</title>

<style>
:root{
  --bg-dark:#0a0f1c;
  --bg-light:#f4f7fb;
  --text-dark:#fff;
  --text-light:#111;
  --primary:#0b3c5d;
  --accent:#7ed957;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  transition:0.4s;
}

.dark{
  background:linear-gradient(135deg,#0a0f1c,#0b3c5d);
  color:var(--text-dark);
}

.light{
  background:var(--bg-light);
  color:var(--text-light);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  backdrop-filter:blur(15px);
}

/* BOTONES */
.btn{
  background:linear-gradient(45deg,#0b3c5d,#7ed957);
  border:none;
  padding:10px 20px;
  border-radius:25px;
  cursor:pointer;
  color:white;
  transition:0.3s;
}
.btn:hover{
  transform:scale(1.08);
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

/* LOGO */
.logo{
  width:180px;
  filter: drop-shadow(0 0 20px rgba(126,217,87,0.5));
  mix-blend-mode:multiply;
}

/* PRODUCTO */
.product{
  text-align:center;
  padding:40px;
}

.product img{
  width:220px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
}

/* TARJETAS */
.card{
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin:20px auto;
  width:300px;
}

/* RELOJ */
.time{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body class="dark">

<nav>
<h2>NEXO</h2>

<div>
<button class="btn" onclick="toggleTheme()">🌙 / ☀️</button>
<button class="btn" onclick="login()">Login</button>
</div>
</nav>

<section class="hero">
<img src="NEXO PHOTO.jpeg" class="logo">

<h1>Tu espacio de calma, siempre contigo</h1>
<p id="user">No conectado</p>

<div class="time">
<p id="fecha"></p>
<p id="hora"></p>
</div>
</section>

<section class="product">

<div class="card">

<h2>Dispositivo NEXO</h2>

<img src="NEXO PHOTO.jpeg">

<p>Stock disponible: <span id="stock">4</span></p>

<select id="cantidad">
<option value="1">1</option>
<option value="2">2</option>
</select>

<button class="btn" onclick="comprar()">Comprar</button>

<p>Carrito: <span id="cart">0</span></p>

</div>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcZD6ayN9cdYOgc6bpTLpj_dhN0oc5OjI",
  authDomain: "nexo-1d9c2.firebaseapp.com",
  projectId: "nexo-1d9c2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user = null;
let cart = 0;

// LOGIN
window.login = async ()=>{
  const res = await signInWithPopup(auth,provider);
  user = res.user;
  document.getElementById("user").innerText = user.email;
}

// STOCK
async function cargarStock(){
  const ref = doc(db,"data","stock");
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{cantidad:4});
  }

  document.getElementById("stock").innerText =
    snap.exists() ? snap.data().cantidad : 4;
}
cargarStock();

// COMPRAR
window.comprar = async ()=>{
  if(!user){
    alert("Inicia sesión");
    return;
  }

  let cant = parseInt(document.getElementById("cantidad").value);

  const ref = doc(db,"data","stock");
  const snap = await getDoc(ref);
  let stock = snap.data().cantidad;

  if(cant > stock){
    alert("Sin stock");
    return;
  }

  await updateDoc(ref,{cantidad: stock - cant});

  cart += cant;
  document.getElementById("cart").innerText = cart;

  cargarStock();
}

// TEMA
window.toggleTheme = ()=>{
  const body = document.body;
  body.classList.toggle("dark");
  body.classList.toggle("light");
}
