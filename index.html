<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXO | Reprograma tu Calma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { nexoGreen: '#7ed957', nexoBlue: '#0b3c5d' } } }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.5s; background-color: #000; color: white; }
        .glass { backdrop-filter: blur(25px); background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); }
        .light .glass { background: rgba(0, 0, 0, 0.05); color: #000; border-color: rgba(0,0,0,0.1); }
        .light { background-color: #f8fafc; color: #0f172a; }
        #cart-panel { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .hero-text { font-size: clamp(3rem, 10vw, 9rem); line-height: 0.9; letter-spacing: -0.05em; }
    </style>
</head>
<body class="dark overflow-x-hidden">

    <nav class="fixed top-6 w-[90%] left-[5%] z-50 glass rounded-full px-8 py-4 flex justify-between items-center shadow-2xl">
        <div class="text-2xl font-black italic">NEXO<span class="text-nexoGreen">.</span></div>
        <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest opacity-70">
            <a href="#inicio" class="hover:text-nexoGreen transition">Inicio</a>
            <a href="#mision" class="hover:text-nexoGreen transition">Nosotros</a>
            <a href="#tienda" class="hover:text-nexoGreen transition">Tienda</a>
            <a href="#contacto" class="hover:text-nexoGreen transition border-l pl-8 border-white/10">Contacto</a>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="toggleTheme()" class="text-xl">🌓</button>
            <button onclick="openCart()" class="bg-white text-black px-5 py-2 rounded-full font-black text-[10px] hover:bg-nexoGreen transition uppercase">
                Bolsa (<span id="count">0</span>)
            </button>
        </div>
    </nav>

    <div class="fixed bottom-6 left-6 z-50 text-[10px] font-black tracking-widest uppercase opacity-40" id="live-clock">
        00:00:00 | 00/00/00
    </div>

    <section id="inicio" class="min-h-screen flex flex-col items-center justify-center text-center px-4">
        <p class="text-nexoGreen font-black tracking-[0.5em] mb-4 text-xs uppercase animate-pulse">Lanzamiento 2026</p>
        <h1 class="hero-text font-black mb-8">NEXO<br><span class="opacity-20 italic">.</span></h1>
        <a href="#tienda" class="bg-nexoGreen text-black px-12 py-5 rounded-full font-black text-sm hover:scale-110 transition shadow-2xl uppercase tracking-widest">Comprar Ahora</a>
    </section>

    <section id="tienda" class="py-32 px-10">
        <div class="max-w-6xl mx-auto glass rounded-[60px] overflow-hidden grid md:grid-cols-2 items-center">
            <div class="p-4">
                <img src="NEXO PHOTO.jpeg" alt="NEXO" class="rounded-[45px] w-full h-full object-cover">
            </div>
            <div class="p-16 space-y-8">
                <h2 class="text-6xl font-black italic tracking-tighter leading-none text-nexoGreen">NEXO</h2>
                <div class="flex justify-between items-end border-b border-white/10 pb-6">
                    <p class="text-5xl font-light" id="unit-price">$250.00 <span class="text-sm opacity-40 uppercase">MXN</span></p>
                    <p class="text-xs font-black uppercase tracking-widest opacity-60">Stock: <span id="real-stock" class="text-red-500 font-bold">4</span></p>
                </div>
                
                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase opacity-40 tracking-[0.3em]">Cantidad inicial:</label>
                    <div class="flex items-center gap-4">
                        <button onclick="changeMainQty(-1)" class="glass w-12 h-12 rounded-full font-bold text-xl">-</button>
                        <span id="main-qty" class="text-3xl font-black w-10 text-center">1</span>
                        <button onclick="changeMainQty(1)" class="glass w-12 h-12 rounded-full font-bold text-xl">+</button>
                    </div>
                </div>

                <div class="flex justify-between items-center font-black text-2xl">
                    <span class="opacity-50 text-sm italic uppercase tracking-widest">Subtotal:</span>
                    <span id="total-val">$250.00</span>
                </div>

                <button onclick="addToCart()" class="w-full bg-white text-black py-6 rounded-3xl font-black text-xl hover:bg-nexoGreen transition shadow-2xl uppercase tracking-tighter active:scale-95">Añadir a la bolsa</button>
            </div>
        </div>
    </section>

    <section id="contacto" class="py-32 px-10 text-center max-w-4xl mx-auto">
        <h2 class="text-5xl font-black mb-16 tracking-tighter">¿TIENES DUDAS? <br><span class="opacity-30 italic">Hablemos.</span></h2>
        <div class="grid md:grid-cols-2 gap-8">
            <a href="https://wa.me/5223115148135" target="_blank" class="glass p-10 rounded-3xl hover:bg-nexoGreen/10 transition group">
                <h4 class="font-black text-xs uppercase mb-2">WhatsApp Directo</h4>
                <p class="text-2xl font-light">231 151 1435</p>
            </a>
            <div class="glass p-10 rounded-3xl">
                <h4 class="font-black text-xs uppercase mb-2">Email Soporte</h4>
                <p class="text-2xl font-light italic opacity-50 text-sm">nexoofficialmx@gmail.com</p>
            </div>
        </div>
    </section>

    <div id="cart-panel" class="fixed top-0 right-0 h-full w-full md:w-[450px] glass z-[100] translate-x-full shadow-2xl flex flex-col p-12">
        <div class="flex justify-between items-center mb-16">
            <h2 class="text-4xl font-black italic tracking-tighter">Tu Bolsa</h2>
            <button onclick="closeCart()" class="text-2xl font-black">✕</button>
        </div>
        <div id="cart-items" class="flex-1 space-y-6 overflow-y-auto text-center">
            <p class="opacity-30 italic py-20">No has agregado nada aún.</p>
        </div>
        <div class="pt-10 border-t border-white/10 space-y-6">
            <div class="flex justify-between text-3xl font-black tracking-tighter">
                <span>Total:</span>
                <span id="cart-total-final">$0.00</span>
            </div>
            <button onclick="confirmFirebaseOrder()" id="btn-confirm" class="w-full bg-nexoGreen text-black py-6 rounded-3xl font-black text-xl hover:brightness-110 shadow-2xl uppercase disabled:opacity-30">Confirmar Pedido</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSy...", authDomain: "nexo-1d9c2.firebaseapp.com", projectId: "nexo-1d9c2" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cartQty = 0;
        let currentStock = 0;
        let mainQty = 1;
        const UNIT_PRICE = 250;

        // --- RELOJ ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-clock').innerText = `${now.toLocaleTimeString()} | ${now.toLocaleDateString()}`;
        }, 1000);

        window.toggleTheme = () => document.body.classList.toggle('light');

        // --- STOCK REAL ---
        onSnapshot(doc(db, "data", "stock"), (snap) => {
            if(snap.exists()) {
                currentStock = snap.data().cantidad;
                document.getElementById('real-stock').innerText = currentStock;
                updateMainUI();
            }
        });

        // --- MANEJO DE CANTIDAD EN TIENDA ---
        window.changeMainQty = (val) => {
            const next = mainQty + val;
            if(next >= 1 && next <= currentStock) {
                mainQty = next;
                updateMainUI();
            }
        }

        function updateMainUI() {
            document.getElementById('main-qty').innerText = mainQty;
            document.getElementById('total-val').innerText = `$${(mainQty * UNIT_PRICE).toFixed(2)}`;
        }

        // --- CARRITO ---
        window.openCart = () => document.getElementById('cart-panel').classList.remove('translate-x-full');
        window.closeCart = () => document.getElementById('cart-panel').classList.add('translate-x-full');

        window.addToCart = () => {
            cartQty = mainQty;
            renderCart();
            openCart();
        }

        window.changeCartQty = (val) => {
            const next = cartQty + val;
            if(next >= 0 && next <= currentStock) {
                cartQty = next;
                renderCart();
            } else if (next > currentStock) {
                alert("Has alcanzado el límite de stock disponible.");
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            document.getElementById('count').innerText = cartQty;
            document.getElementById('cart-total-final').innerText = `$${(cartQty * UNIT_PRICE).toFixed(2)}`;
            
            if(cartQty === 0) {
                container.innerHTML = `<p class="opacity-30 italic py-20">Tu bolsa está vacía.</p>`;
                document.getElementById('btn-confirm').disabled = true;
                return;
            }

            document.getElementById('btn-confirm').disabled = false;
            container.innerHTML = `
                <div class="glass p-6 rounded-[35px] space-y-6">
                    <div class="flex gap-4">
                        <img src="NEXO PHOTO.jpeg" class="w-20 h-20 rounded-2xl object-cover">
                        <div class="text-left">
                            <p class="text-nexoGreen font-black text-xs tracking-widest uppercase">Dispositivo NEXO</p>
                            <p class="text-xl font-bold">$250.00 c/u</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl">
                        <p class="text-xs font-bold uppercase opacity-50 tracking-widest">Ajustar cantidad</p>
                        <div class="flex items-center gap-4">
                            <button onclick="changeCartQty(-1)" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition">-</button>
                            <span class="font-black text-xl">${cartQty}</span>
                            <button onclick="changeCartQty(1)" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition">+</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- PEDIDO FINAL ---
        window.confirmFirebaseOrder = async () => {
            if(cartQty === 0) return;
            
            const stockRef = doc(db, "data", "stock");
            const snap = await getDoc(stockRef);
            const realCurrentStock = snap.data().cantidad;

            if (cartQty > realCurrentStock) {
                alert("El stock cambió mientras comprabas. Ajustando...");
                location.reload();
                return;
            }

            await updateDoc(stockRef, { cantidad: realCurrentStock - cartQty });
            await setDoc(doc(db, "pedidos", "NEXO-" + Date.now()), {
                cantidad: cartQty,
                total: cartQty * UNIT_PRICE,
                fecha: new Date().toLocaleString(),
                estado: "Nuevo"
            });

            alert("¡Pedido realizado! Gracias por confiar en NEXO.");
            cartQty = 0;
            renderCart();
            closeCart();
        }
    </script>
</body>
</html>
