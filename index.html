<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO | Tú Espacio De Calma, Siempre Contigo</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0b3c5d,#7ed957);
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

/* BOTONES */
.btn{
  background:#7ed957;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.05);
}

/* PRODUCTO */
.product{
  text-align:center;
  padding:40px;
}

.product img{
  width:240px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  transition:0.3s;
}
.product img:hover{
  transform:scale(1.05);
}

/* ADMIN */
.admin{
  display:none;
  background:rgba(0,0,0,.3);
  padding:20px;
  margin:20px;
  border-radius:10px;
}

/* ANIMACIÓN */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.show{
  opacity:1;
  transform:translateY(0);
}

/* RELOJ */
.time-box{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<nav>
<h2>NEXO</h2>
<button class="btn" onclick="login()">Login</button>
</nav>

<section class="hero fade">
<h1>NEXO</h1>
<p id="user">No conectado</p>

<div class="time-box">
<p id="fecha"></p>
<p id="hora"></p>
</div>
</section>

<section class="product fade">
<h2>Producto</h2>

<img src="NEXO PHOTO.jpeg"
onerror="this.src='https://i.postimg.cc/0Q0zZxYw/nexo.jpg'">

<p>Stock disponible: <span id="stock">4</span></p>

<select id="cantidad">
<option value="1">1</option>
<option value="2">2</option>
</select>

<button class="btn" onclick="comprar()">Comprar</button>

<p>Carrito: <span id="cart">0</span></p>
</section>

<section class="admin" id="admin">
<h2>Panel Admin</h2>
<div id="pedidos"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcZD6ayN9cdYOgc6bpTLpj_dhN0oc5OjI",
  authDomain: "nexo-1d9c2.firebaseapp.com",
  projectId: "nexo-1d9c2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user = null;
let cart = 0;

// LOGIN
window.login = async ()=>{
  const res = await signInWithPopup(auth,provider);
  user = res.user;
  document.getElementById("user").innerText = user.email;

  document.getElementById("admin").style.display="block";
  cargarPedidos();
}

// STOCK
async function cargarStock(){
  const ref = doc(db,"data","stock");
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{cantidad:4});
    document.getElementById("stock").innerText = 4;
  } else {
    document.getElementById("stock").innerText = snap.data().cantidad;
  }
}
cargarStock();

// COMPRAR
window.comprar = async ()=>{
  if(!user){
    alert("Inicia sesión");
    return;
  }

  let cant = parseInt(document.getElementById("cantidad").value);

  const ref = doc(db,"data","stock");
  const snap = await getDoc(ref);
  let stock = snap.data().cantidad;

  if(cant > stock){
    alert("No hay suficiente stock");
    return;
  }

  await updateDoc(ref,{cantidad: stock - cant});

  await setDoc(doc(db,"pedidos",Date.now().toString()),{
    user:user.email,
    cantidad:cant,
    fecha:new Date().toISOString()
  });

  cart += cant;
  document.getElementById("cart").innerText = cart;

  cargarStock();
  alert("Compra realizada");
}

// ADMIN
async function cargarPedidos(){
  const query = await getDocs(collection(db,"pedidos"));
  let html="";

  query.forEach(doc=>{
    let d = doc.data();
    html += <p>${d.user} - ${d.cantidad}</p>;
  });

  document.getElementById("pedidos").innerHTML = html;
}

// RELOJ CDMX
function actualizarHora(){
  const opciones = { timeZone: "America/Mexico_City", hour12:false };
  const ahora = new Date();

  document.getElementById("hora").innerText =
    ahora.toLocaleTimeString("es-MX", opciones);

  document.getElementById("fecha").innerText =
    ahora.toLocaleDateString("es-MX", { timeZone: "America/Mexico_City" });
}

setInterval(actualizarHora,1000);
actualizarHora();

// ANIMACIONES
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

</script>

</body>
</html>
