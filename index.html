<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0b3c5d,#7ed957);
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
}

/* BOTONES */
.btn{
  background:#7ed957;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

/* PRODUCTO */
.product{
  text-align:center;
  padding:20px;
}

.product img{
  width:200px;
  border-radius:15px;
}

/* ADMIN */
.admin{
  display:none;
  padding:20px;
}
</style>
</head>

<body>

<nav>
<h2>NEXO</h2>
<button class="btn" onclick="login()">Login</button>
</nav>

<section class="hero">
<h1>NEXO</h1>
<p id="user">No conectado</p>

<p id="fecha"></p>
<p id="hora"></p>
</section>

<section class="product">
<h2>Producto</h2>

<img src="NEXO PHOTO.jpeg"
onerror="this.src='https://i.postimg.cc/0Q0zZxYw/nexo.jpg'">

<p>Stock: <span id="stock">4</span></p>

<select id="cantidad">
<option value="1">1</option>
<option value="2">2</option>
</select>

<button class="btn" onclick="comprar()">Comprar</button>

<p>Carrito: <span id="cart">0</span></p>
</section>

<section class="admin" id="admin">
<h2>Pedidos</h2>
<div id="pedidos"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcZD6ayN9cdYOgc6bpTLpj_dhN0oc5OjI",
  authDomain: "nexo-1d9c2.firebaseapp.com",
  projectId: "nexo-1d9c2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user = null;
let cart = 0;

// LOGIN
window.login = async ()=>{
  const res = await signInWithPopup(auth,provider);
  user = res.user;
  document.getElementById("user").innerText = user.email;

  document.getElementById("admin").style.display="block";
  cargarPedidos();
}

// STOCK
async function cargarStock(){
  const ref = doc(db,"data","stock");
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{cantidad:4});
  }

  document.getElementById("stock").innerText = snap.exists() ? snap.data().cantidad : 4;
}
cargarStock();

// COMPRAR
window.comprar = async ()=>{
  if(!user){
    alert("Inicia sesión primero");
    return;
  }

  let cant = parseInt(document.getElementById("cantidad").value);

  const ref = doc(db,"data","stock");
  const snap = await getDoc(ref);
  let stock = snap.data().cantidad;

  if(cant > stock){
    alert("No hay stock suficiente");
    return;
  }

  await updateDoc(ref,{cantidad: stock - cant});

  await setDoc(doc(db,"pedidos",Date.now().toString()),{
    user:user.email,
    cantidad:cant
  });

  cart += cant;
  document.getElementById("cart").innerText = cart;

  cargarStock();
  alert("Compra realizada");
}

// ADMIN
async function cargarPedidos(){
  const query = await getDocs(collection(db,"pedidos"));
  let html="";

  query.forEach(doc=>{
    let d = doc.data();
    html += <p>${d.user} - ${d.cantidad}</p>;
  });

  document.getElementById("pedidos").innerHTML = html;
}

// RELOJ CDMX
function actualizarHora(){
  const opciones = { timeZone: "America/Mexico_City", hour12:false };
  const ahora = new Date();

  document.getElementById("hora").innerText =
    ahora.toLocaleTimeString("es-MX", opciones);

  document.getElementById("fecha").innerText =
    ahora.toLocaleDateString("es-MX", { timeZone: "America/Mexico_City" });
}

setInterval(actualizarHora,1000);
actualizarHora();

</script>

</body>
</html>
